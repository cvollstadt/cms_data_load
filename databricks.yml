# This is a Databricks asset bundle definition for cms_data_load.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: cms_data_load
  uuid: 68850477-d0b7-4dfc-9e03-ba8f1aa0d9fc

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog: 
    description: The catalog to use
  schema: 
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-3125c6fa-5aa5.cloud.databricks.com
    variables:
      catalog: sandbox
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-3125c6fa-5aa5.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/cvollstadt@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/cvollstadt@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: sandbox
      schema: cms_data_raw
    permissions:
      - user_name: cvollstadt@gmail.com
        level: CAN_MANAGE
