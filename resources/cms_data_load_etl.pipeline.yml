# The main pipeline for cms_data_load

resources:
  pipelines:
    cms_data_load_etl:
      name: cms_data_load_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/cms_data_load_etl"

      libraries:
        - glob:
            include: ../src/cms_data_load_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
