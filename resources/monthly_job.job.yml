# Monthly Incremental Job for CMS Data
# Scheduled to run on the 5th of each month to load current month's data
resources:
  jobs:
    cms_monthly_incremental:
      name: CMS Data Monthly Incremental Load
      
      schedule:
        quartz_cron_expression: "0 0 5 * *"  # Run at midnight on the 5th of every month
        timezone_id: "America/New_York"
        pause_status: UNPAUSED
      
      tasks:
        - task_key: monthly_orchestrator
          notebook_task:
            notebook_path: ../src/orchestrator.py
            base_parameters:
              mode: "incremental"
              catalog: ${var.catalog}
              schema: ${var.schema}
              max_parallel: "5"
          
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 2
            autoscale:
              min_workers: 2
              max_workers: 4
            spark_conf:
              "spark.databricks.delta.optimizeWrite.enabled": "true"
              "spark.databricks.delta.autoCompact.enabled": "true"
          
          timeout_seconds: 7200  # 2 hours
          max_retries: 2
          retry_on_timeout: true
      
      email_notifications:
        on_success:
          - cvollstadt@gmail.com
        on_failure:
          - cvollstadt@gmail.com
        on_duration_warning_threshold_exceeded:
          - cvollstadt@gmail.com
      
      notification_settings:
        no_alert_for_skipped_runs: false
        no_alert_for_canceled_runs: false
      
      timeout_seconds: 7200
      max_concurrent_runs: 1
      
      tags:
        environment: ${bundle.target}
        purpose: "monthly_incremental"
        data_source: "cms_gov"
        schedule: "monthly"
