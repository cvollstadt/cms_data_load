# Historical Backfill Job for CMS Data
# One-time execution to load 5 years of historical data
resources:
  jobs:
    cms_backfill_job:
      name: CMS Data Historical Backfill
      
      tasks:
        - task_key: backfill_orchestrator
          notebook_task:
            notebook_path: ../src/orchestrator.py
            base_parameters:
              mode: "backfill"
              start_year: "2021"
              end_year: "2026"
              catalog: ${var.catalog}
              schema: ${var.schema}
              max_parallel: "5"
          
          timeout_seconds: 43200  # 12 hours
          max_retries: 1
      
      email_notifications:
        on_success:
          - cvollstadt@gmail.com
        on_failure:
          - cvollstadt@gmail.com
      
      parameters:
        - name: start_year
          default: "2021"
        - name: end_year  
          default: "2026"
        - name: max_parallel
          default: "5"
      
      tags:
        environment: ${bundle.target}
        purpose: "historical_backfill"
        data_source: "cms_gov"
