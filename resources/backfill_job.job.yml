# Historical Backfill Job for CMS Data
# Uses For Each task for efficient parallel downloads
resources:
  jobs:
    cms_backfill_job:
      name: CMS Data Historical Backfill
      
      tasks:
        # Task 1: Generate list of download tasks
        - task_key: generate_tasks
          notebook_task:
            notebook_path: ../src/orchestrator.py
            base_parameters:
              mode: "backfill"
              start_year: "2025"
              end_year: "2026"
              catalog: ${var.catalog}
              schema: ${resources.schemas.cms_data_schema.name}
          
          timeout_seconds: 600  # 10 minutes to generate tasks
          max_retries: 1
        
        # Task 2: For Each - Download and extract files in parallel
        - task_key: download_extract_foreach
          depends_on:
            - task_key: generate_tasks
          for_each_task:
            inputs: "{{tasks.generate_tasks.values.output}}"
            concurrency: 10  # Parallel downloads
            task:
              task_key: download_extract
              notebook_task:
                notebook_path: ../src/download_extract.py
                base_parameters:
                  url: "{{input.url}}"
                  landing_path: "{{input.landing_path}}"
                  catalog: ${var.catalog}
                  schema: ${resources.schemas.cms_data_schema.name}
                  year: "{{input.year}}"
                  month: "{{input.month}}"
              
              timeout_seconds: 600  # 10 minutes per download
              max_retries: 1
        
        # Task 3: Process tables with Auto Loader
        - task_key: process_tables
          depends_on:
            - task_key: download_extract_foreach
          notebook_task:
            notebook_path: ../src/process_tables-1.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${resources.schemas.cms_data_schema.name}
              mode: "backfill"
          
          timeout_seconds: 7200  # 2 hours for processing
          max_retries: 1
      
      email_notifications:
        on_success:
          - cvollstadt@gmail.com
        on_failure:
          - cvollstadt@gmail.com
      
      parameters:
        - name: start_year
          default: "2021"
        - name: end_year  
          default: "2026"
      
      tags:
        environment: ${bundle.target}
        purpose: "historical_backfill"
        data_source: "cms_gov"


